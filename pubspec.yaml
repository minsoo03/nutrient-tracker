name: nutrient_tracker
description: "일일 영양소 & 장기 건강 트래킹 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 라우팅
  go_router: ^14.2.7

  # 네트워크
  http: ^1.2.2

  # 환경 변수 (.env 파일 로드)
  flutter_dotenv: ^5.2.1
  # Supabase Auth + Postgres
  supabase_flutter: ^2.12.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
